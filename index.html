<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebForge - Professional Web Builder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-cube"></i>
                <h1>WebForge</h1>
            </div>
            <div class="login-form">
                <h2>Sign in to your account</h2>
                <p class="subtitle">Access your web builder dashboard</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email address</label>
                        <input type="email" id="email" name="email" placeholder="name@company.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn-primary">Sign in with Email</button>
                </form>
                
                <div class="divider">
                    <span>or</span>
                </div>
                
                <button type="button" class="btn-google" id="googleSignIn">
                    <i class="fab fa-google"></i>
                    <span>Sign in with Google</span>
                </button>
                
                <div class="signup-section">
                    <p>Don't have an account? <a href="#">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.5/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
